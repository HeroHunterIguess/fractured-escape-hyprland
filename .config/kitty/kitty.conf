font_family Noto Sans Mono
font_size 10

shell_integration no-cursor
cursor_shape beam
cursor              #7fe07f

window_padding_width 9
window_padding_height 9

scrollback_lines 5000

map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0

background_opacity 0.8
dynamic_background_opacity yes
background_blur 1

cursor_trail 1

# 16 main colors
color0                   #3c3836
color1                   #cc241d
color2                   #98971a
color3                   #d79921
color4                   #458588
color5                   #b16286
color6                   #689d6a
color7                   #a89984
color8                   #928374
color9                   #fb4934
color10                  #b8bb26
color11                  #fabd2f
color12                  #83a598
color13                  #d3869b
color14                  #8ec07c
color15                  #fbf1c7
